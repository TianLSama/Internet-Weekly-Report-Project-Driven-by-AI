name = "weekly-security-report"
main = "worker.py"
compatibility_date = "2025-06-01"
compatibility_flags = ["python_workers"]

# ============================================================
# 部署后按下面步骤填入你的 KV namespace id:
#   wrangler kv:namespace create REPORT_KV
#   (将输出的 id 替换下面的 YOUR_KV_ID)
# ============================================================
[[kv_namespaces]]
binding = "REPORT_KV"
id = "YOUR_KV_ID"

# ============================================================
# 定时触发器 — 每周五 UTC 02:00 = 北京时间 10:00
# ┌─────────── 分钟 (0)
# │ ┌───────── 小时 (2)
# │ │ ┌─────── 日期 (任意)
# │ │ │ ┌───── 月份 (任意)
# │ │ │ │ ┌─── 星期几 (5 = 周五)
# │ │ │ │ │
# 0 2 * * 5
# ============================================================
[triggers]
crons = ["0 2 * * 5"]
